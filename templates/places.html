{% extends "base.html" %}

{% block content %}

<h2>Tourist Places</h2>

<div class="places-grid">

{% for place in places %}

<div class="place-card">

<img src="{{ url_for('static', filename='images/places/' + place.image) }}">

<h3>{{ place.place_name }}</h3>

<p>{{ place.description }}</p>

<a href="/place/{{ place.id }}" class="btn">Gallery</a>

</div>

{% endfor %}

</div>

{% endblock %}
